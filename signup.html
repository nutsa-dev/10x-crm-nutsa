<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>10X CRM - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <script src="js/guard.js"></script>
    <script src="js/theme.js"></script>
</head>
<body class="auth-body">

    <div class="fixed-theme-wrapper">
        <button type="button" class="btn-theme-fixed" id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle Theme">🌙</button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="card">
        <h2>Create Account</h2>
        <p class="card-subtitle">Get started with your 10X CRM workspace</p>

        <form id="signupForm" novalidate>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" class="form-input-neo" placeholder="John Doe">
                <div class="error-text" id="fullNameError"></div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-input-neo" placeholder="name@company.com">
                <div class="error-text" id="emailError"></div>
            </div>
            <div class="form-group">
                <label>Company (optional)</label>
                <input type="text" id="company" class="form-input-neo" placeholder="Acme Inc.">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-input-neo" placeholder="••••••••">
                <div class="password-strength-container" id="passwordStrengthContainer" style="display: none;">
                    <div class="strength-bar-wrapper">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText">Weak</div>
                </div>
                <div class="error-text" id="passwordError"></div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-input-neo" placeholder="••••••••">
                <div class="error-text" id="confirmPasswordError"></div>
            </div>
            <button type="submit" class="btn-submit-glass">Create Account</button>
        </form>

        <div class="link">
            Already have an account? <a href="index.html">Log in</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', handleSignUp);
    </script>
</body>
</html>
