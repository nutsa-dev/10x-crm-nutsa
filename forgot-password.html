<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>10X CRM - Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <script src="js/guard.js"></script>
    <script src="js/theme.js"></script>
</head>
<body class="auth-body">

    <div class="fixed-theme-wrapper">
        <button type="button" class="btn-theme-fixed" id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle Theme">🌙</button>
    </div>

    <div class="toast" id="toast"></div>

    <div class="card">
        <h2>Reset Password</h2>
        <p class="card-subtitle">Enter your registered email to set a new password</p>

        <div class="global-error" id="globalError"></div>

        <form id="resetPasswordForm" novalidate>
            <div class="form-group" id="emailStepGroup">
                <label>Email Address</label>
                <input type="email" id="resetEmail" class="form-input-neo" placeholder="name@company.com">
                <div class="error-text" id="resetEmailError"></div>
            </div>

            <div id="newPasswordStepGroup" style="display: none;">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="resetNewPassword" class="form-input-neo" placeholder="••••••••">
                    <div class="error-text" id="resetNewPasswordError"></div>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="resetConfirmPassword" class="form-input-neo" placeholder="••••••••">
                    <div class="error-text" id="resetConfirmPasswordError"></div>
                </div>
            </div>

            <button type="submit" class="btn-submit-glass" id="resetSubmitBtn">Verify Email</button>
        </form>

        <div class="link">
            Remembered your password? <a href="index.html">Log in</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', handlePasswordReset);
    </script>
</body>
</html>
