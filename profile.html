<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM - Profile Settings</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="js/guard.js"></script>
    <script src="js/theme.js"></script>
</head>
<body class="app-body">

    <div class="toast" id="toast"></div>

    <header class="app-header">
        <div class="header-container">
            <div class="brand">
                <span class="brand-logo">10X</span>
                <span class="brand-title">CRM</span>
            </div>

            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="clients.html" class="nav-link">Clients</a>
                <a href="profile.html" class="nav-link active">Profile</a>
            </nav>

            <div class="header-actions">
                <div class="live-clock" id="liveClock">00:00:00 AM</div>
                <button type="button" class="btn-theme" id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle Theme">🌙</button>
                <button type="button" class="btn-logout" onclick="logout()">Log Out</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            
            <div class="page-header-bar">
                <div>
                    <h1>Account Profile</h1>
                </div>
            </div>

            <div class="profile-layout-grid">
                
                <div class="profile-col-left">
                    <div class="profile-card card">
                        <div class="profile-header-info">
                            <div class="avatar-circle" id="profileInitials">NB</div>
                            <div class="profile-user-details">
                                <h2 id="profileFullName">User Name</h2>
                                <p id="profileEmail" class="user-email-text"></p>
                                <p id="profileMeta" class="profile-meta"></p>
                            </div>
                        </div>
                    </div>

                    <div class="profile-card card danger-card">
                        <h3>Data Management</h3>
                        <p class="card-subtitle text-left">Reset your local CRM client database to the initial API state.</p>
                        <button type="button" class="btn-delete-client btn-reset-data" onclick="resetCRMData()">Reset CRM Data</button>
                    </div>
                </div>

                <div class="profile-col-middle">
                    <div class="profile-card card">
                        <h3>Edit Profile</h3>
                        <form id="editProfileForm" novalidate>
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="editFullName" class="form-input-neo">
                                <div class="error-text" id="editFullNameError"></div>
                            </div>
                            <div class="form-group">
                                <label>Company</label>
                                <input type="text" id="editCompany" class="form-input-neo">
                            </div>
                            <button type="submit" class="btn-submit-glass">Save Changes</button>
                        </form>
                    </div>
                </div>

                <div class="profile-col-right">
                    <div class="profile-card card">
                        <h3>Change Password</h3>
                        <form id="changePasswordForm" novalidate>
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="currentPassword" class="form-input-neo">
                                <div class="error-text" id="currentPasswordError"></div>
                            </div>
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="newPassword" class="form-input-neo">
                                <div class="error-text" id="newPasswordError"></div>
                            </div>
                            <div class="form-group">
                                <label>Confirm New Password</label>
                                <input type="password" id="confirmNewPassword" class="form-input-neo">
                                <div class="error-text" id="confirmNewPasswordError"></div>
                            </div>
                            <button type="submit" class="btn-submit-glass">Change Password</button>
                        </form>
                    </div>
                </div>

            </div>

        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
