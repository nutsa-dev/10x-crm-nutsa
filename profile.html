<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>10X CRM - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/guard.js"></script>
</head>
<body class="app-body">

    <div class="sidebar">
        <div>
            <div class="logo" style="cursor: pointer;" onclick="window.location.href='dashboard.html'">10X CRM</div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="clients.html">Clients</a>
                <a href="profile.html" class="active">Profile</a>
            </div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 14px; width: 100%;">
            <button class="btn-theme-fixed" style="width: 100%; justify-content: center;" onclick="toggleTheme()">🌓 Toggle Theme</button>
            <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <div class="main-content" style="max-width: 800px; width: 100%;">
        <div class="header-panel" style="margin-bottom: 40px;">
            <h1>My Profile</h1>
        </div>

        <div class="client-card" style="padding: 30px; margin-bottom: 30px; flex-direction: row; align-items: center; gap: 24px;">
            <div id="profInitials" style="width: 80px; height: 80px; border-radius: 50%; background: var(--accent-color); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; box-shadow: var(--shadow-light), var(--shadow-dark);">
                NB
            </div>
            <div>
                <h2 id="profName" style="font-size: 26px; font-weight: 800; margin: 0;">Loading...</h2>
                <p id="profEmail" style="font-weight: 700; color: var(--text-muted);"></p>
                <p id="profMeta" style="font-size: 13px; font-weight: 600; color: var(--text-muted); margin-top: 4px;"></p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: 30px; margin-bottom: 30px;">
            <div class="card" style="padding: 30px; max-width: 100%;">
                <h3 style="font-size: 20px; font-weight: 800; margin-bottom: 20px;">Edit Profile</h3>
                <form id="editProfileForm" novalidate>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editFullName" class="form-input-neo">
                        <div class="error-text" id="editFullNameError"></div>
                    </div>
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" id="editCompany" class="form-input-neo">
                    </div>
                    <button type="submit" class="btn-submit-glass" style="font-size: 16px; padding: 14px;">Save Changes</button>
                </form>
            </div>

            <div class="card" style="padding: 30px; max-width: 100%;">
                <h3 style="font-size: 20px; font-weight: 800; margin-bottom: 20px;">Change Password</h3>
                <form id="changePasswordForm" novalidate>
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" class="form-input-neo">
                        <div class="error-text" id="currentPasswordError"></div>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" class="form-input-neo">
                        <div class="error-text" id="newPasswordError"></div>
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" class="form-input-neo">
                        <div class="error-text" id="confirmNewPasswordError"></div>
                    </div>
                    <button type="submit" class="btn-submit-glass" style="font-size: 16px; padding: 14px;">Change Password</button>
                </form>
            </div>

            <div class="card" style="padding: 30px; max-width: 100%; border: 1px dashed var(--danger-color);">
                <h3 style="font-size: 20px; font-weight: 800; color: var(--danger-color); margin-bottom: 12px;">Danger Zone</h3>
                <p style="font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 20px; background: none; box-shadow: none; padding: 0;">
                    Resetting CRM data will clear all local client modifications, custom notes, and re-fetch the baseline of 30 clients from the API. Your profile account and login session will not be deleted.
                </p>
                <button type="button" class="btn-logout" style="width: 100%;" onclick="resetCRMData()">Reset CRM Data</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
