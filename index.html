<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="js/guard.js"></script>
    <script src="js/theme.js"></script>
</head>
<body class="auth-body">

    <div class="toast" id="toast"></div>

    <div class="fixed-theme-wrapper">
        <button type="button" class="btn-theme-fixed" id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle Theme">🌙</button>
    </div>

    <div class="card">
        <h2>Welcome</h2>
        <div class="global-error" id="globalError"></div>
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" class="form-input-neo">
                <div class="error-text" id="loginEmailError"></div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-input-neo">
                <div class="error-text" id="loginPasswordError"></div>
            </div>
            <div class="form-group-checkbox">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe" class="label-checkbox">Remember me</label>
            </div>
            <button type="submit" class="btn-submit-glass">Log In</button>
        </form>
        <div class="link" style="margin-top: 20px !important;">
            <a href="forgot-password.html">Forgot password?</a>
        </div>
        <div class="link">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
